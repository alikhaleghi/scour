name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/scour README.md LICENSE dist/
          cd dist && tar czf ../scour-${{ github.ref_name }}-x86_64-linux.tar.gz *

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: scour-${{ github.ref_name }}-x86_64-linux.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/scour README.md LICENSE dist/
          cd dist && tar czf ../scour-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: scour-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item target/release/scour.exe, README.md, LICENSE -Destination dist/
          Compress-Archive -Path dist/* -DestinationPath scour-${{ github.ref_name }}-x86_64-windows.zip

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: scour-${{ github.ref_name }}-x86_64-windows.zip
